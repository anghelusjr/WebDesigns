<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic Setup -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->

  <meta
    name="description"
    content="WDA Web Design creates modern, responsive, and conversion-focused websites for businesses looking to grow online."
  />

    name="keywords"
